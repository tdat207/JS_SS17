<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Todo App</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h2{
    text-align:center;
}

.input-group{
    display:flex;
}

input{
    flex:1;
    padding:8px;
}

button{
    padding:8px 10px;
    cursor:pointer;
}

ul{
    list-style:none;
    padding:0;
}

li{
    padding:10px;
    border-bottom:1px solid #ddd;
    display:flex;
    justify-content:space-between;
}

.done{
    text-decoration:line-through;
    color:gray;
}

.actions button{
    margin-left:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Todo List</h2>

<div class="input-group">
<input id="todoInput" placeholder="Nhập công việc...">
<button onclick="addTodo()">Thêm</button>
</div>

<ul id="todoList"></ul>

</div>

<script>


let todos = JSON.parse(localStorage.getItem("myTodos")) || [];


function saveData(){

    localStorage.setItem("myTodos", JSON.stringify(todos));

}



function renderTodos(){

    let html="";

    todos.forEach(function(todo,index){

        html += `
        <li>

            <span 
            class="${todo.completed ? "done" : ""}" 
            onclick="toggleTodo(${index})">

            ${todo.text}

            </span>

            <div class="actions">

                <button onclick="editTodo(${index})">Sửa</button>

                <button onclick="deleteTodo(${index})">Xóa</button>

            </div>

        </li>
        `;

    });

    document.getElementById("todoList").innerHTML = html;

}



function addTodo(){

    let input = document.getElementById("todoInput");

    let value = input.value.trim();

    if(value === ""){
        alert("Không được để trống");
        return;
    }

    let todo = {

        text:value,
        completed:false

    };

    todos.push(todo);

    saveData();

    renderTodos();

    input.value="";

}



function toggleTodo(index){

    todos[index].completed = !todos[index].completed;

    saveData();

    renderTodos();

}



function deleteTodo(index){

    if(confirm("Bạn có chắc muốn xóa?")){

        todos.splice(index,1);

        saveData();

        renderTodos();

    }

}



function editTodo(index){

    let newText = prompt("Nhập nội dung mới", todos[index].text);

    if(newText === null) return;

    if(newText.trim() === ""){

        alert("Không được để trống");

        return;

    }

    todos[index].text = newText;

    saveData();

    renderTodos();

}



document
.getElementById("todoInput")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){

        addTodo();

    }

});


renderTodos();

</script>

</body>
</html>
